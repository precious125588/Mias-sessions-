<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mias MDX — Powered by Precious</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-hover: #1a1a28;
      --border: rgba(255, 255, 255, 0.06);
      --border-focus: rgba(0, 200, 150, 0.5);
      --text: #e8e8ef;
      --text-muted: rgba(255, 255, 255, 0.45);
      --accent: #00c896;
      --accent-glow: rgba(0, 200, 150, 0.15);
      --accent-dark: #00a67a;
      --gradient-1: linear-gradient(135deg, #00c896 0%, #00b4d8 100%);
      --gradient-2: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 20%, rgba(0, 200, 150, 0.04) 0%, transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(0, 180, 216, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 32px 28px;
      border: 1px solid var(--border);
      position: relative;
      z-index: 1;
      box-shadow: 0 0 80px rgba(0, 200, 150, 0.03),
                  0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .header { text-align: center; margin-bottom: 28px; }

    .logo-wrap {
      width: 80px;
      height: 80px;
      margin: 0 auto 18px;
      position: relative;
    }

    .logo-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: var(--gradient-1);
      opacity: 0.6;
      animation: pulse-ring 3s ease-in-out infinite;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: var(--bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      position: relative;
      z-index: 1;
      color: var(--accent);
    }

    @keyframes pulse-ring {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }

    .title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Toggle */
    .toggle-container {
      display: flex;
      background: var(--bg);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
    }

    .toggle-option {
      flex: 1;
      padding: 11px 16px;
      text-align: center;
      cursor: pointer;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .toggle-option.active {
      background: var(--accent);
      color: #000;
      box-shadow: 0 4px 20px rgba(0, 200, 150, 0.25);
    }

    .toggle-option:hover:not(.active) {
      color: var(--text);
      background: var(--surface-hover);
    }

    /* Input */
    .input-group { margin-bottom: 20px; transition: all 0.3s ease; }
    .input-group.hidden { display: none; }

    .input-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .input-field::placeholder { color: rgba(255,255,255,0.2); }

    .input-field:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* Buttons */
    .generate-btn {
      width: 100%;
      padding: 14px;
      background: var(--gradient-1);
      border: none;
      border-radius: 12px;
      color: #000;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-bottom: 16px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 200, 150, 0.3);
    }

    .generate-btn:active { transform: translateY(0); }
    .generate-btn.hidden { display: none; }

    .copy-btn {
      width: 100%;
      padding: 12px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text);
      transition: all 0.3s ease;
    }

    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Display */
    .code-display {
      background: var(--bg);
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 16px;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--border);
      letter-spacing: 4px;
      color: var(--accent);
    }

    .qr-display {
      background: var(--bg);
      padding: 28px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 16px;
      border: 1.5px solid var(--border);
      display: none;
    }

    .qr-image {
      max-width: 260px;
      max-height: 260px;
      margin: 0 auto 16px;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    .qr-instructions {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .success-message {
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
    }

    .error-message {
      color: #ff4757;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
    }

    .loading {
      display: none;
      text-align: center;
      margin: 16px 0;
    }

    .loading i {
      font-size: 24px;
      color: var(--accent);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .footer span {
      color: var(--accent);
      font-weight: 600;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: var(--accent-glow);
      color: var(--accent);
      margin-bottom: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @media (max-width: 480px) {
      .container { padding: 24px 20px; }
      .title { font-size: 22px; }
      .code-display { font-size: 18px; letter-spacing: 3px; }
      .qr-image { max-width: 220px; max-height: 220px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-wrap">
        <div class="logo-ring"></div>
        <div class="logo"><i class="fas fa-bolt"></i></div>
      </div>
      <h1 class="title">Mias MDX</h1>
      <p class="subtitle">Powered by Precious</p>
      <div class="status-badge">
        <span class="status-dot"></span>
        System Online
      </div>
    </div>

    <!-- Toggle Switch -->
    <div class="toggle-container">
      <div class="toggle-option active" data-mode="pair">
        <i class="fas fa-key"></i> Pair Code
      </div>
      <div class="toggle-option" data-mode="qr">
        <i class="fas fa-qrcode"></i> QR Code
      </div>
    </div>

    <div class="input-group" id="inputGroup">
      <label class="input-label">WhatsApp number with country code</label>
      <input type="text" id="mobileNumber" class="input-field" placeholder="+1234567890" pattern="[+][0-9]{10,}" title="Enter country code starting with + followed by number"/>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generateCode()">
      <i class="fas fa-bolt"></i>&nbsp; Generate Session
    </button>

    <div class="loading" id="loading">
      <i class="fas fa-spinner"></i>
      <p style="margin-top:8px;font-size:13px;color:rgba(255,255,255,0.4);">Connecting to WhatsApp...</p>
    </div>

    <div class="code-display" id="codeDisplay" style="display:none;"></div>

    <div class="qr-display" id="qrDisplay">
      <img id="qrImage" class="qr-image" src="" alt="QR Code"/>
      <div class="qr-instructions">
        <p>Open WhatsApp → <strong>Linked Devices</strong> → <strong>Link a Device</strong></p>
        <p style="margin-top:4px;">Scan this QR code with your phone</p>
      </div>
    </div>

    <button class="copy-btn" id="copyBtn" style="display:none;" onclick="copyCode()">
      <i class="fas fa-copy"></i> Copy Session Code
    </button>

    <div class="footer">
      &copy; 2025 <span>Mias MDX</span> &bull; All Rights Reserved
    </div>
  </div>

  <script>
    let currentMode = 'pair';
    let qrInterval = null;

    // Toggle handling
    document.querySelectorAll('.toggle-option').forEach(option => {
      option.addEventListener('click', function() {
        document.querySelectorAll('.toggle-option').forEach(o => o.classList.remove('active'));
        this.classList.add('active');
        currentMode = this.dataset.mode;

        const inputGroup = document.getElementById('inputGroup');
        const generateBtn = document.getElementById('generateBtn');

        if (currentMode === 'pair') {
          inputGroup.classList.remove('hidden');
          generateBtn.classList.remove('hidden');
          document.getElementById('qrDisplay').style.display = 'none';
          if (qrInterval) { clearInterval(qrInterval); qrInterval = null; }
        } else {
          inputGroup.classList.add('hidden');
          generateBtn.classList.add('hidden');
          startQRSession();
        }

        document.getElementById('codeDisplay').style.display = 'none';
        document.getElementById('copyBtn').style.display = 'none';
        document.getElementById('loading').style.display = 'none';
      });
    });

    // Generate pair code
    async function generateCode() {
      const number = document.getElementById('mobileNumber').value.trim();
      if (!number) { alert('Please enter your WhatsApp number'); return; }

      const loading = document.getElementById('loading');
      const codeDisplay = document.getElementById('codeDisplay');
      const copyBtn = document.getElementById('copyBtn');
      const generateBtn = document.getElementById('generateBtn');

      loading.style.display = 'block';
      codeDisplay.style.display = 'none';
      copyBtn.style.display = 'none';
      generateBtn.disabled = true;

      try {
        const cleanNumber = number.replace(/[^0-9+]/g, '').replace('+', '');
        const response = await fetch(`/pair?number=${cleanNumber}`);
        const data = await response.json();

        loading.style.display = 'none';

        if (data.error) {
          codeDisplay.style.display = 'flex';
          codeDisplay.innerHTML = `<span class="error-message"><i class="fas fa-exclamation-circle"></i> ${data.error}</span>`;
        } else if (data.code) {
          codeDisplay.style.display = 'flex';
          codeDisplay.textContent = data.code;
          copyBtn.style.display = 'flex';
        } else if (data.session || data.success) {
          codeDisplay.style.display = 'flex';
          codeDisplay.innerHTML = `<span class="success-message"><i class="fas fa-check-circle"></i> Session generated!</span>`;
        }
      } catch (error) {
        loading.style.display = 'none';
        codeDisplay.style.display = 'flex';
        codeDisplay.innerHTML = `<span class="error-message"><i class="fas fa-exclamation-circle"></i> Connection error. Try again.</span>`;
      }

      generateBtn.disabled = false;
    }

    // Copy code
    function copyCode() {
      const code = document.getElementById('codeDisplay').textContent;
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        btn.style.borderColor = 'var(--accent)';
        btn.style.color = 'var(--accent)';
        setTimeout(() => {
          btn.innerHTML = '<i class="fas fa-copy"></i> Copy Session Code';
          btn.style.borderColor = '';
          btn.style.color = '';
        }, 2000);
      });
    }

    // QR session
    async function startQRSession() {
      const loading = document.getElementById('loading');
      const qrDisplay = document.getElementById('qrDisplay');
      const codeDisplay = document.getElementById('codeDisplay');
      const copyBtn = document.getElementById('copyBtn');

      loading.style.display = 'block';
      qrDisplay.style.display = 'none';
      codeDisplay.style.display = 'none';
      copyBtn.style.display = 'none';

      try {
        const response = await fetch('/qr');
        const data = await response.json();
        loading.style.display = 'none';

        if (data.qr) {
          document.getElementById('qrImage').src = data.qr;
          qrDisplay.style.display = 'block';

          if (qrInterval) clearInterval(qrInterval);
          qrInterval = setInterval(async () => {
            try {
              const res = await fetch('/qr');
              const d = await res.json();
              if (d.qr) {
                document.getElementById('qrImage').src = d.qr;
              } else if (d.success || d.session) {
                clearInterval(qrInterval);
                qrInterval = null;
                qrDisplay.style.display = 'none';
                codeDisplay.style.display = 'flex';
                codeDisplay.innerHTML = `<span class="success-message"><i class="fas fa-check-circle"></i> Session generated!</span>`;
              }
            } catch (e) {}
          }, 15000);
        } else if (data.error) {
          codeDisplay.style.display = 'flex';
          codeDisplay.innerHTML = `<span class="error-message"><i class="fas fa-exclamation-circle"></i> ${data.error}</span>`;
        }
      } catch (error) {
        loading.style.display = 'none';
        codeDisplay.style.display = 'flex';
        codeDisplay.innerHTML = `<span class="error-message"><i class="fas fa-exclamation-circle"></i> QR error. Try again.</span>`;
      }
    }

    // Enter key
    document.getElementById('mobileNumber').addEventListener('keyup', function(e) {
      if (e.key === 'Enter') generateCode();
    });
  </script>
</body>
</html>
